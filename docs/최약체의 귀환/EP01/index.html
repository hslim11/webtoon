<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>최약체의 귀환 — ep01</title>
<!--
  세로 스크롤 웹툰 뷰어 (단일 HTML, 외부 의존성 없음)
  - 말풍선·한글 대사는 각 패널 PNG에 이미 베이크됨(in-image) → 텍스트 오버레이 없음.
  - PANELS 데이터 배열이 유일한 편집 지점: { src, alt, gap }.
      gap = 이 패널 '다음'의 이음새(px). 0=무봉제 연속 컷, 클수록 장면 전환/침묵/임팩트 체류.
  - 패널은 원본 비율(width:100%; height:auto)로 온전히 배치 → 베이크 말풍선 잘림 없음.
-->
<style>

    --max-w: 720px;          /* 모바일 우선 기준 폭(데스크톱은 중앙 정렬) */
    --page-bg: #0e0e10;      /* 뷰어 바깥 배경 */
    --strip-bg: #000000;     /* 패널 스트립 배경(암전 컷과 이어지도록 검정) */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page-bg);
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    color: #111;
    -webkit-text-size-adjust: 100%;
  }
  header.viewer-head {
    position: sticky; top: 0; z-index: 50;
    background: rgba(14,14,16,.92);
    color: #f5f5f7; text-align: center;
    padding: 10px 12px; font-size: 14px; letter-spacing: .02em;
    backdrop-filter: blur(6px);
  }
  header.viewer-head b { font-weight: 700; }
  .strip {
    max-width: var(--max-w);
    margin: 0 auto;
    background: var(--strip-bg);
    display: flex; flex-direction: column;
    gap: 0; /* 이음새는 패널별 margin-bottom(gap)으로 제어 */
  }
  .cover { max-width: var(--max-w); margin: 0 auto; background: var(--strip-bg); line-height: 0; }
  .cover img { width: 100%; height: auto; display: block; }
  .panel { position: relative; line-height: 0; }
  .panel img {
    width: 100%; height: auto; display: block;
    background: #1c1c1e; /* 이미지 로드 전/결손 시에도 칸 형태 유지(암부 톤) */
  }
  .panel .missing {
    line-height: 1.5; color: #b00020; background: #fff3f3;
    border: 2px dashed #b00020; text-align: center;
    padding: 48px 12px; font-size: 14px;
  }
  footer.viewer-foot {
    color:#9a9aa2; text-align:center; padding:28px 12px 60px;
    font-size:13px; max-width: var(--max-w); margin:0 auto;
  }
</style>
</head>
<body>
<header class="viewer-head"><b id="m-title">최약체의 귀환</b> · <span id="m-ep">ep01</span></header>

/* ===== 렌더러 ===== */
function el(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }

function renderPanel(p, i){
  const panel = el("div", "panel");
  if (p.gap) panel.style.marginBottom = p.gap + "px"; // 이음새(리듬)
  const img = new Image();
  img.loading = "lazy";              // 긴 회차 성능을 위한 지연 로드
  img.decoding = "async";
  img.alt = p.alt || ("panel " + String(i+1).padStart(3,"0"));
  img.src = p.src;
  img.onerror = () => {              // 결손/0바이트 PNG는 칸을 비우지 않고 표시
    const ph = el("div", "missing", "⚠ 패널 이미지 누락/손상: " + p.src);
    img.replaceWith(ph);
  };
  panel.appendChild(img);
  return panel;
}

(function init(){
  document.title = META.title + " — " + META.episode;

  document.getElementById("m-ep").textContent = META.episode;
  const strip = document.getElementById("strip");
  PANELS.forEach((p,i) => strip.appendChild(renderPanel(p,i)));
  document.getElementById("foot").textContent =
    "총 " + PANELS.length + " 패널 · 「최약체의 귀환」 ep01 · 끝까지 스크롤하세요";
})();
