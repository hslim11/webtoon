/* ===== 렌더러 ===== */
function el(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }

function renderPanel(p, i){
  const panel = el("div", "panel");
  if (p.gap) panel.style.marginBottom = p.gap + "px"; // 이음새(리듬)
  const img = new Image();
  img.loading = "lazy";              // 긴 회차 성능을 위한 지연 로드
  img.decoding = "async";
  img.alt = p.alt || ("panel " + String(i+1).padStart(3,"0"));
  img.src = p.src;
  img.onerror = () => {              // 결손/0바이트 PNG는 칸을 비우지 않고 표시
    const ph = el("div", "missing", "⚠ 패널 이미지 누락/손상: " + p.src);
    img.replaceWith(ph);
  };
  panel.appendChild(img);
  return panel;
}

  document.getElementById("m-ep").textContent = META.episode;
  const strip = document.getElementById("strip");
